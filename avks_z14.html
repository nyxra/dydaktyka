<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Avksentieva Z14_html</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    h1 { font-size: 1.8em; }
    table { border-collapse: collapse; width: 100%; margin-top: 16px; }
    th { background: #1a3a5c; color: #fff; padding: 8px 12px; text-align: left; }
    td { border: 1px solid #aaa; padding: 7px 12px; vertical-align: middle; }
    tr:nth-child(even) td { background: #f5f5f5; }
    .demo { width: 60px; height: 28px; border-radius: 4px; display: inline-block; }
  </style>
</head>
<body>

<h1>Sposoby definiowania kolorów w CSS</h1>

<table>
  <tr>
    <th>Sposób</th>
    <th>Składnia</th>
    <th>Przykład</th>
    <th>Podgląd</th>
  </tr>
  <tr>
    <td><b>a) Heksadecymalny</b></td>
    <td><code>color: #RRGGBB;</code></td>
    <td><code>color: #FF5733;</code></td>
    <td><span class="demo" style="background:#FF5733;"></span></td>
  </tr>
  <tr>
    <td><b>b) RGB (liczby 0–255)</b></td>
    <td><code>color: rgb(R, G, B);</code></td>
    <td><code>color: rgb(255, 100, 13);</code></td>
    <td><span class="demo" style="background:rgb(255,100,13);"></span></td>
  </tr>
  <tr>
    <td><b>c) Nazwa koloru</b></td>
    <td><code>color: nazwa;</code></td>
    <td><code>color: red;</code></td>
    <td><span class="demo" style="background:red;"></span></td>
  </tr>
  <tr>
    <td><b>d) RGB (procenty)</b></td>
    <td><code>color: rgb(R%, G%, B%);</code></td>
    <td><code>color: rgb(10%, 40%, 78%);</code></td>
    <td><span class="demo" style="background:rgb(10%,40%,78%);"></span></td>
  </tr>
</table>

</body>
</html>
<!-- Avksentieva Z14_html -->
