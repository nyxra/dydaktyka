<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Życzenia dla Tato</title>
<style>
  body {
    font-family: monospace;
    background-color: #111;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 10px;
    text-align: center;
  }

  #text {
    font-size: 2em; /* крупный текст для телефона и ПК */
    line-height: 1.5em;
    margin-bottom: 30px;
  }

  .heart {
    color: red;
    white-space: pre;
    font-size: 3em; /* крупное сердечко */
    line-height: 1em;
  }

  /* Адаптив для маленьких экранов */
  @media (max-width: 600px) {
    #text {
      font-size: 1.5em;
    }
    .heart {
      font-size: 2em;
    }
  }
</style>
</head>
<body>

<div id="text"></div>
<div class="heart" id="heart"></div>

<script>
const dadName = "TATO"; // большие буквы

const messages = [
  `ŻYCZENIA DLA ${dadName}`,
  `DROGI ${dadName}!`,
  "WSZYSTKIEGO NAJLEPSZEGO Z OKAZJI URODZIN! ŻYCZĘ ZDROWIA, SZCZĘŚCIA I SUKCESÓW :)",
  "NIECH KAŻDY DZIEŃ PRZYNOSI RADOŚĆ I UŚMIECH :)",
  "DZIĘKUJĘ ZA TWOJE WSPARCIE I MIŁOŚĆ :)",
  "Z MIŁOŚCIĄ, TWOJA CÓRKA VERONIKA! :)",
  "NIECH TEN DZIEŃ BĘDZIE WYJĄTKOWY!"
];

const heartShape = [
  "  **   **  ",
  " *  * *  * ",
  "*    *    *",
  " *       * ",
  "  *     *  ",
  "   *   *   ",
  "    * *    ",
  "     *     "
];

const textDiv = document.getElementById("text");
const heartDiv = document.getElementById("heart");

function typeText(text, delay) {
  return new Promise(resolve => {
    let i = 0;
    const interval = setInterval(() => {
      textDiv.innerHTML += text[i];
      i++;
      if (i >= text.length) {
        clearInterval(interval);
        textDiv.innerHTML += "<br>";
        resolve();
      }
    }, delay);
  });
}

async function showMessages() {
  for (let msg of messages) {
    await typeText(msg, 20);
  }

  // Показ сердца
  for (let line of heartShape) {
    heartDiv.innerHTML += line + "<br>";
    await new Promise(r => setTimeout(r, 50));
  }
}

showMessages();
</script>

</body>
</html>
