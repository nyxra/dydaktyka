<h1>Kaskadowe Arkusze Stylów CSS</h1>
<h2>Cechy CSS</h2>

<p>CSS - Kaskadowe Arkusze Stylów (Cascading Style Sheets) to język służący do opisu wyglądu dokumentów HTML.</p>
<p>Style pozwalają oddzielić strukturę dokumentu od jego prezentacji.</p>
<p>Dzięki zewnętrznym arkuszom stylów możemy zarządzać wyglądem wielu stron jednocześnie.</p>

<h2>Zalety stosowania CSS</h2>
<p>Modyfikacja wyglądu strony jest szybka i wygodna.</p>
<p>Dokumenty są bardziej przejrzyste i krótsze.</p>

</body>

/* Styl zewnętrzny - Zadanie 15 */

body {
  font-family: Arial, sans-serif;
  font-size: 21mm;
  /* sposób 4: rgb(%) - 125+dzień urodzenia, 50+numer buta, 200+miesiąc urodzenia */
  color: rgb(56%, 34%, 80%);
  background-color: #f5f5f5;
  margin: 20px;
}

p {
  font-size: 21mm;
  /* sposób 1: hex - 100+miesiąc, 150+dzień, 50+numer buta */
  color: #68A857;
}

h1 {
  color: #1a3a5c;
  text-decoration: underline;
}

h2 {
  color: #333333;
}

/* Avksentieva Z15_html */
